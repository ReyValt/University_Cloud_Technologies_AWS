<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Courses Application</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 15px; cursor: pointer; }
        pre { background: #f4f4f4; padding: 10px; margin-top: 20px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <h2>Courses Management System</h2>
    <button onclick="getCourses()">Load Courses</button>
    <pre id="result">Data will appear here...</pre>

    <script>
        function getCourses() {
            const apiUrl = "https://s0qjrptm16.execute-api.eu-north-1.amazonaws.com/prod/courses";
            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    document.getElementById("result").innerText = JSON.stringify(data, null, 2);
                })
                .catch(error => {
                    document.getElementById("result").innerText = "Error: " + error;
                });
        }
    </script>
</body>
</html>
